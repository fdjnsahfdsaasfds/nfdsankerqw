# cog.yaml
build:
  gpu: true
  cuda: "12.1"
  system_packages:
    - "ffmpeg"
  python_version: "3.11"
  python_packages:
    - "torch==2.5.1"
    - "torchvision==0.20.1"
    - "torchaudio==2.5.1"
    - "transformers"
    - "accelerate"
    - "sentencepiece"
    - "imageio"
    - "imageio-ffmpeg"
    - "huggingface-hub"
    - "requests"
    - "peft"
    - "protobuf"
  run:
    - "pip install git+https://github.com/huggingface/diffusers.git"
    - "python3 -c \"from huggingface_hub import snapshot_download; snapshot_download(repo_id='Wan-AI/Wan2.2-I2V-A14B-Diffusers', ignore_patterns=['*.pt', '*.bin'])\""

predict: "predict.py:Predictor"
