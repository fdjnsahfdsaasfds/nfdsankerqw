# cog.yaml
build:
  gpu: true
  cuda: "12.1"
  system_packages:
    - "ffmpeg"
  python_version: "3.11"
  python_packages:
    - "torch==2.5.1"
    - "torchvision"
    - "torchaudio"
    - "transformers"
    - "accelerate"
    - "sentencepiece"
    - "imageio"
    - "imageio-ffmpeg"
    - "huggingface-hub"
    - "requests"
    - "peft"
    - "protobuf"
  run:
    - "pip install git+https://github.com/huggingface/diffusers.git"

predict: "predict.py:Predictor"
