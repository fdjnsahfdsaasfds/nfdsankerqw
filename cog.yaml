# cog.yaml
build:
  gpu: true
  cuda: "12.1"
  system_packages:
    - "ffmpeg"
  python_version: "3.11"
  python_packages:
    - "torch==2.3.1"
    - "torchvision"
    - "torchaudio"
    - "transformers"
    - "accelerate"
    - "sentencepiece"
    - "imageio"
    - "imageio-ffmpeg"
    - "hf-transfer"
    - "requests"
    - "peft"
    - "protobuf"
  run:
    - "pip install git+https://github.com/huggingface/diffusers.git"
    - "HF_HUB_ENABLE_HF_TRANSFER=1 python3 -c \"import os; from huggingface_hub import snapshot_download; snapshot_download(repo_id='Wan-AI/Wan2.2-I2V-A14B-Diffusers', ignore_patterns=['*.pt', '*.bin'], token=os.environ.get('HF_TOKEN'))\""

predict: "predict.py:Predictor"
