# .github/workflows/push.yml
name: Push to Replicate
on:
  workflow_dispatch:
    inputs:
      model_name:
        description: 'Your Replicate model (e.g., your-username/wan-2.2-i2v-lora)'
        required: true

jobs:
  push_to_replicate:
    name: Build and Push
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          docker-images: false

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Cog
        uses: replicate/setup-cog@v2
        with:
          token: ${{ secrets.REPLICATE_API_TOKEN }}

      - name: Push to Replicate
        env:
          MODEL_NAME: ${{ inputs.model_name }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: cog push r8.im/$MODEL_NAME --no-cache
